[platformio]
default_envs = m5cardputer
src_dir = .

[env:m5cardputer]
platform = espressif32@6.4.0
board = esp32-s3-devkitc-1
framework = arduino
build_flags = 
    -DARDUINO_M5Stack_Cardputer
    -DCORE_DEBUG_LEVEL=2
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -Isrc

monitor_speed = 115200
upload_speed = 1500000

lib_deps = 
	m5stack/M5GFX
	m5stack/M5Unified
	m5stack/M5Cardputer
	bblanchon/ArduinoJson
